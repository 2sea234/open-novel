server:
  port: 8010

spring:
  application:
    name: gateway
  config:
    import:
      - optional:nacos:novel-gateway-local.yaml?group=DEFAULT_GROUP&refresh-enabled=true
  cloud:
    nacos:
      discovery:
        namespace:
        group: DEFAULT_GROUP
      config:
        namespace:
        group: DEFAULT_GROUP
        file-extension: yaml
  profiles:
    active: local